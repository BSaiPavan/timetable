<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable AI Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .upload-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .btn-extract { background: #007bff; border: none; padding: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-extract:hover { background: #0056b3; }
        #loading { display: none; }
    </style>
</head>
<body>

<div class="upload-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-dark">📅 Timetable AI</h2>
        <p class="text-muted">Llama 3.3 will extract your schedule data.</p>
    </div>

    <form action="/upload-pdf" method="post" enctype="multipart/form-data" id="uploadForm">
        <div class="mb-4">
            <label class="form-label fw-semibold">Select Schedule PDF</label>
            <input type="file" name="file" class="form-control" accept=".pdf" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-extract" id="submitBtn">
            Start AI Extraction
        </button>
    </form>

    <div id="loading" class="text-center mt-3 text-primary">
        <div class="spinner-border spinner-border-sm" role="status"></div>
        <span class="ms-2">AI is reading your PDF... please wait.</span>
    </div>
</div>

<script>
    // Show loading spinner when form is submitted
    document.getElementById('uploadForm').onsubmit = function() {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';
    };
</script>

</body>
</html>
